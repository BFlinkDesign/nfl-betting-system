# Low-noise default-branch guard.
# Reusable logic lives in BFlinkDesign/dev-setup.
name: guard

on:
  push:
    branches: [master]
  delete:

jobs:
  guard:
    uses: BFlinkDesign/dev-setup/.github/workflows/guard-main.yml@main
    with:
      protected_branch: master
    permissions:
      contents: read
      issues: write