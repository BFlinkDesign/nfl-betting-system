name: Weekly Model Retraining

on:
  schedule:
    # Run every Monday at 3 AM ET (8 AM UTC)
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: weekly-retrain
  cancel-in-progress: false

jobs:
  retrain-model:
    name: Retrain NFL Prediction Model
    runs-on: ubuntu-latest
    permissions:
      # Needed to commit refreshed models and publish a release.
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download latest NFL data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/download_data.py --seasons 2024 --force --no-pbp

      - name: Train favorites specialist model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/train_favorites_specialist.py
        continue-on-error: true

      - name: Run validation tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/backtest.py
        continue-on-error: true

      - name: Upload model artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: retrained-model-${{ github.run_number }}
          path: |
            models/*.pkl
            models/*.joblib
            reports/retrain_*.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Create performance report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/generate_performance_dashboard.py
        continue-on-error: true

      - name: Commit updated model (if improved)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add models/ reports/ || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: Weekly model retrain - $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true

      - name: Create release on significant improvement
        if: success()
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: model-v${{ github.run_number }}
          name: Weekly Model Update ${{ github.run_number }}
          body: |
            Automated weekly model retraining completed successfully.

            Model Version: ${{ github.run_number }}
            Commit: ${{ github.sha }}

            See attached artifacts for model files and performance reports.
          draft: false
          prerelease: false
        continue-on-error: true
